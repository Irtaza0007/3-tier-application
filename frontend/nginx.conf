server {
  listen 80;
  server_name _;  # Replace _ with your domain name, e.g., example.com

  # Serving static frontend files
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;  # Important for SPAs
  }

  # Reverse proxy to backend API
  location /api/ {
    proxy_pass http://backend:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Include this for better handling of the proxy request
    proxy_set_header X-Forwarded-Proto $scheme;  # Ensure the correct protocol (HTTP or HTTPS) is passed
  }
}